name: Weekly Business Health Report

on:
  #schedule:
    #- cron: "0 3 * * 1"   # Every Monday at 3 AM UTC = 8 AM Pakistan time
  workflow_dispatch:        # Adds a manual "Run workflow" button on GitHub

jobs:
  send-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Rotate CSV files and generate new data
        run: python generate_data.py

      - name: Run Business Nerve System
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python main.py